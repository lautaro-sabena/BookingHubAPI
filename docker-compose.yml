version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bookinghub_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookinghub_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BookingHubDB;User Id=sa;Password=Password123!;TrustServerCertificate=True
      - Jwt__SecretKey=${JWT_SECRET_KEY:-DevSecretKey12345678901234567890}
      - Jwt__Issuer=BookingHubAPI
      - Jwt__Audience=BookingHubAPI
      - Cors__AllowedOrigins=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "5000:8080"
    depends_on:
      - sqlserver
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookinghub_frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: on-failure

volumes:
  sqlserver_data:
