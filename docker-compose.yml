services:
  postgres:
    image: postgres:16-alpine
    container_name: bookinghub_postgres
    environment:
      - POSTGRES_DB=bookinghubdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookinghub_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=bookinghubdb;Username=postgres;Password=postgres
      - Jwt__SecretKey=DevSecretKey12345678901234567890
      - Jwt__Issuer=BookingHubAPI
      - Jwt__Audience=BookingHubAPI
      - Cors__AllowedOrigins=http://localhost:3000
    ports:
      - "5000:8080"
    depends_on:
      - postgres
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookinghub_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: on-failure

volumes:
  postgres_data: